
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- iOS Safe viewport (single correct one only) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <title>Subliminal Player</title>

    <!-- IMPORTANT: GitHub Pages base fix -->
    <base href="/Subwes/" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Subliminal" />

    <link rel="apple-touch-icon" href="./icons/icon-192.png" />

    <style>
      :root {
        --apple-bg: #ffffff;
        --apple-blue: #0071e3;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: var(--apple-bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      #app-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--apple-bg);
        z-index: 9999;
      }

      .logo {
        width: 82px;
        height: 82px;
        border-radius: 22px;
        background: #f2f2f7;
        animation: pulse 2s infinite ease-in-out;
      }

      .text {
        margin-top: 18px;
        font-size: 13px;
        color: #8e8e93;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.96); opacity: 0.6; }
      }
    </style>
  </head>

  <body>
    <div id="app-shell">
      <div class="logo"></div>
      <div class="text">Subliminal</div>
    </div>

    <div id="root"></div>
    <div id="modal-root"></div>

    <script type="module" src="./src/main.tsx"></script>

    <!-- IMPORTANT: Safe SW registration for GitHub Pages -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then(() => console.log("SW registered"))
            .catch((err) => console.log("SW failed", err));
        });
      }
    </script>
  </body>
</html>
