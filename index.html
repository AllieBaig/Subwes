
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <title>Subliminal Player</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Subliminal" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <style>
      :root {
        --apple-bg: #ffffff;
        --apple-blue: #0071e3;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: var(--apple-bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      #app-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--apple-bg);
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      .logo {
        width: 82px;
        height: 82px;
        border-radius: 22px;
        background: #f2f2f7;
        animation: pulse 2s infinite ease-in-out;
      }

      .text {
        margin-top: 18px;
        font-size: 13px;
        color: #8e8e93;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.96); opacity: 0.6; }
      }
      
      .hidden { display: none !important; }
    </style>
  </head>

  <body>
    <div id="app-shell">
      <div class="logo"></div>
      <div class="text">Subliminal</div>
    </div>

    <div id="root"></div>
    <div id="modal-root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 2026-04-29 09:32:15
      // File creation: 2026-04-29 09:32:15
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          // Register using a relative path to ensure it finds sw.js 
          // in the same folder as index.html
          navigator.serviceWorker
            .register("sw.js")
            .then((reg) => console.log("SW registered on scope:", reg.scope))
            .catch((err) => console.log("SW failed", err));
        });
      }
    </script>
  </body>
</html>
